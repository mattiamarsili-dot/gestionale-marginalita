<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gestionale Altra Mobilità{% endblock %}</title>
  <!-- PWA: app installabile su telefono/tablet -->
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <meta name="theme-color" content="#0d6efd">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Altra Mobilità">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary-custom">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">
        <i class="bi bi-bar-chart-fill me-2"></i>Gestionale Altra Mobilità
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
              data-bs-target="#navMain" aria-controls="navMain"
              aria-expanded="false" aria-label="Apri menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <div class="navbar-nav ms-auto align-items-lg-center">
          <div class="nav-schede">
            <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
            <a class="nav-link {% if request.endpoint in ['clienti', 'cliente_nuovo', 'cliente_dettaglio', 'cliente_modifica'] %}active{% endif %}" href="{{ url_for('clienti') }}">
              <i class="bi bi-people-fill me-1"></i>Clienti
            </a>
            <a class="nav-link {% if request.endpoint in ['pratiche', 'dettaglio_pratica', 'modifica_pratica'] %}active{% endif %}" href="{{ url_for('pratiche') }}">
              <i class="bi bi-folder2-open me-1"></i>Pratiche
            </a>
            <a class="nav-link {% if request.endpoint == 'fatturati' %}active{% endif %}" href="{{ url_for('fatturati') }}">
              <i class="bi bi-receipt me-1"></i>Fatturati
            </a>
            <a class="nav-link {% if request.endpoint in ['note_inbox', 'note_nuova'] %}active{% endif %}" href="{{ url_for('note_inbox') }}">
              <i class="bi bi-sticky me-1"></i>Note
            </a>
            <a class="nav-link {% if request.endpoint in ['presets', 'preset_nuovo', 'preset_modifica'] %}active{% endif %}" href="{{ url_for('presets') }}">
              <i class="bi bi-collection me-1"></i>Preset
            </a>
          </div>
          <a class="nav-link btn-nuova ms-lg-3 mt-2 mt-lg-0 {% if request.endpoint == 'nuova_pratica' %}active{% endif %}" href="{{ url_for('nuova_pratica') }}">
            <i class="bi bi-plus-circle-fill me-1"></i>Nuova Pratica
          </a>
          <a class="nav-link ms-lg-3 text-white-50" href="{{ url_for('scarica_backup') }}"
             title="Scarica backup completo (.json)">
            <i class="bi bi-cloud-download me-1"></i><span class="d-lg-none">Backup</span>
          </a>
          {% if session.get('autenticato') %}
          <a class="nav-link ms-lg-3 text-white-50" href="{{ url_for('logout') }}" title="Esci">
            <i class="bi bi-box-arrow-right me-1"></i><span class="d-lg-none">Esci</span>
          </a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='select-add.js') }}"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () { navigator.serviceWorker.register('/sw.js').catch(function () {}); });
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
