<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <!-- maximum-scale=1 evita lo zoom automatico iOS al focus; font ≥16px sugli input -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Nuovo cliente rapido — Gestionale</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --brand: #0d6efd; }
    body { background: #f1f3f5; -webkit-text-size-adjust: 100%; }
    /* Input grandi e comodi per la scrittura a mano su tablet (Scribble/handwriting) */
    .m-form .form-control,
    .m-form .form-select {
      font-size: 1.2rem;
      min-height: 3.25rem;
      padding: .65rem .9rem;
    }
    .m-form label { font-weight: 600; font-size: .95rem; margin-bottom: .25rem; color: #344054; }
    .m-card { border: none; border-radius: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .m-card .card-header {
      background: var(--brand); color: #fff; border-radius: 1rem 1rem 0 0;
      font-weight: 600; font-size: 1.05rem; padding: .85rem 1.1rem;
    }
    .m-header { position: sticky; top: 0; z-index: 1030; background: var(--brand); color: #fff; }
    /* Barra azioni fissa in basso, sopra l'home indicator dei tablet */
    .m-footer {
      position: sticky; bottom: 0; z-index: 1030;
      background: rgba(255,255,255,.96); backdrop-filter: blur(6px);
      border-top: 1px solid #dee2e6;
      padding: .75rem 1rem calc(.75rem + env(safe-area-inset-bottom));
    }
    .btn-salva { font-size: 1.2rem; font-weight: 600; padding: .85rem; border-radius: .85rem; }
    .m-wrap { max-width: 820px; }
  </style>
</head>
<body>
  <div class="m-header py-3 px-3 d-flex align-items-center gap-2 shadow-sm">
    <i class="bi bi-person-vcard fs-4"></i>
    <div class="lh-sm">
      <div class="fw-bold">Nuovo cliente rapido</div>
      <small class="opacity-75">Compila e apri subito la pratica</small>
    </div>
    <a href="{{ url_for('clienti') }}" class="btn btn-sm btn-light ms-auto"><i class="bi bi-list-ul"></i></a>
  </div>

  <main class="m-wrap mx-auto p-3 pb-2">
    {% if errore %}
    <div class="alert alert-danger d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-triangle-fill"></i>{{ errore }}
    </div>
    {% endif %}

    <form method="post" class="m-form" id="form-mobile">
      <!-- Anagrafica -->
      <div class="card m-card mb-3">
        <div class="card-header"><i class="bi bi-person-fill me-2"></i>Anagrafica</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label>Cognome *</label>
              <input type="text" name="cognome" class="form-control" required autofocus
                     autocapitalize="words" autocomplete="off" value="{{ cliente.cognome or '' }}">
            </div>
            <div class="col-12 col-md-6">
              <label>Nome</label>
              <input type="text" name="nome" class="form-control"
                     autocapitalize="words" autocomplete="off" value="{{ cliente.nome or '' }}">
            </div>
            <div class="col-12 col-md-7">
              <label>Codice Fiscale</label>
              <input type="text" name="codice_fiscale" class="form-control text-uppercase"
                     maxlength="16" autocapitalize="characters" autocomplete="off"
                     spellcheck="false" value="{{ cliente.codice_fiscale or '' }}">
            </div>
            <div class="col-6 col-md-5">
              <label>Data di nascita</label>
              <input type="date" name="data_nascita" class="form-control" value="{{ cliente.data_nascita or '' }}">
            </div>
            <div class="col-12">
              <label>Luogo di nascita</label>
              <input type="text" name="luogo_nascita" class="form-control"
                     autocapitalize="words" autocomplete="off" value="{{ cliente.luogo_nascita or '' }}">
            </div>
          </div>
        </div>
      </div>

      <!-- Residenza -->
      <div class="card m-card mb-3">
        <div class="card-header"><i class="bi bi-house-fill me-2"></i>Residenza</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-8">
              <label>Via / Piazza</label>
              <input type="text" name="residenza_via" class="form-control"
                     autocapitalize="words" autocomplete="off" value="{{ cliente.residenza_via or '' }}">
            </div>
            <div class="col-4">
              <label>Civico</label>
              <input type="text" name="residenza_civico" class="form-control"
                     autocomplete="off" value="{{ cliente.residenza_civico or '' }}">
            </div>
            <div class="col-12 col-md-6">
              <label>Città / Comune</label>
              <input type="text" name="residenza_citta" class="form-control"
                     autocapitalize="words" autocomplete="off" value="{{ cliente.residenza_citta or '' }}">
            </div>
            <div class="col-5 col-md-3">
              <label>Provincia</label>
              <input type="text" name="provincia" class="form-control text-uppercase" maxlength="2"
                     autocapitalize="characters" autocomplete="off" value="{{ cliente.provincia or '' }}">
            </div>
            <div class="col-7 col-md-3">
              <label>CAP</label>
              <input type="text" name="residenza_cap" class="form-control" maxlength="5"
                     inputmode="numeric" autocomplete="off" value="{{ cliente.residenza_cap or '' }}">
            </div>
          </div>
        </div>
      </div>

      <!-- Contatti e sanità -->
      <div class="card m-card mb-3">
        <div class="card-header"><i class="bi bi-heart-pulse-fill me-2"></i>Contatti e sanità</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label>Telefono</label>
              <input type="tel" name="telefono" class="form-control"
                     inputmode="tel" autocomplete="off" value="{{ cliente.telefono or '' }}">
            </div>
            <div class="col-12 col-md-6">
              <label>ASL di appartenenza</label>
              <input type="text" name="asl" class="form-control" placeholder="Es. RM 2"
                     autocomplete="off" value="{{ cliente.asl or '' }}">
            </div>
            <div class="col-12 col-md-6">
              <label>Medico curante</label>
              <input type="text" name="medico_curante" class="form-control"
                     autocapitalize="words" autocomplete="off" value="{{ cliente.medico_curante or '' }}">
            </div>
            <div class="col-12 col-md-6">
              <label>Centro di appartenenza</label>
              <input type="text" name="centro" class="form-control" list="centri-list"
                     autocomplete="off" placeholder="Scegli o digita un nuovo centro"
                     value="{{ cliente.centro or '' }}">
              <datalist id="centri-list">
                {% for c in centri %}<option value="{{ c }}"></option>{% endfor %}
              </datalist>
            </div>
          </div>
        </div>
      </div>

      <p class="text-muted small px-1">
        Gli altri dati (documento, email, note) si completano poi dalla scheda cliente.
      </p>
    </form>
  </main>

  <div class="m-footer">
    <div class="m-wrap mx-auto">
      <button type="submit" form="form-mobile" class="btn btn-primary btn-salva w-100">
        <i class="bi bi-check2-circle me-2"></i>Salva e apri pratica
      </button>
    </div>
  </div>

  <script>
    // Normalizza CF e provincia in maiuscolo mentre si scrive (anche con Scribble)
    document.querySelectorAll('input[name="codice_fiscale"], input[name="provincia"]').forEach(function (el) {
      el.addEventListener('input', function () {
        const s = el.selectionStart;
        el.value = el.value.toUpperCase();
        try { el.setSelectionRange(s, s); } catch (_) {}
      });
    });
    // Evita doppio invio (tap multipli sul tablet)
    document.getElementById('form-mobile').addEventListener('submit', function (e) {
      const btn = document.querySelector('.btn-salva');
      if (btn.dataset.sent) { e.preventDefault(); return; }
      btn.dataset.sent = '1';
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvataggio…';
    });
  </script>
</body>
</html>
